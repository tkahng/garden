# Local PostgreSQL (Docker Compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/garden
spring.datasource.username=garden
spring.datasource.password=garden

# Local MinIO (S3-compatible)
storage.endpoint=http://localhost:9000
storage.bucket=garden
storage.access-key=minioadmin
storage.secret-key=minioadmin
storage.base-url=http://localhost:9000/garden

# Local mail (disable real sending)
spring.mail.host=localhost
spring.mail.port=1025

# JWT secret for local dev (generate: openssl rand -base64 32)
app.jwt.secret=bG9jYWxEZXZTZWNyZXRLZXlUaGF0SXNBdExlYXN0MzJCeXRlc0xvbmc=

# Google OAuth2 — replace with real credentials when needed
spring.security.oauth2.client.registration.google.client-id=local-client-id
spring.security.oauth2.client.registration.google.client-secret=local-client-secret
