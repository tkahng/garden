# Local overrides — create a .env file at the project root (git-ignored) to set secrets
spring.config.import=optional:file:./.env[.properties]

# Local PostgreSQL (Docker Compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/garden
spring.datasource.username=garden
spring.datasource.password=garden

# Local MinIO (S3-compatible)
storage.endpoint=http://localhost:9000
storage.bucket=garden
storage.access-key=minioadmin
storage.secret-key=minioadmin
storage.base-url=http://localhost:9000/garden

# Mail — defaults to local dummy (MailHog/no-op); override with real SMTP via env vars
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

# JWT secret for local dev (generate: openssl rand -base64 32)
app.jwt.secret=bG9jYWxEZXZTZWNyZXRLZXlUaGF0SXNBdExlYXN0MzJCeXRlc0xvbmc=

# Google OAuth2 — replace with real credentials when needed
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-client-secret}
