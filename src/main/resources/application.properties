spring.application.name=garden

# JPA — never auto-generate DDL; Flyway owns the schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080

# Multipart upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# JWT (override in profile-specific properties)
app.jwt.secret=${JWT_SECRET:ZGV2U2VjcmV0S2V5Rm9yTG9jYWxEZXZPbmx5Tm90Rm9yUHJvZA==}
app.jwt.access-token-ttl=PT15M
app.jwt.refresh-token-ttl=P30D
app.jwt.email-verification-ttl=PT24H
app.jwt.password-reset-ttl=PT24H

# Superuser seeding
app.superuser.email=${SUPERUSER_EMAIL:owner@garden.local}
app.superuser.password=${SUPERUSER_PASSWORD:changeme}

# Frontend (for OAuth2 redirect)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_change_me}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_change_me}
