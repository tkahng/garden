# Testcontainers provides the datasource via @ServiceConnection — no hardcoded URL needed.

# Include the test-only probe migration so BaseEntityIT can use ProbeEntity.
spring.flyway.locations=classpath:db/migration,classpath:db/testmigration

# Provide dummy OAuth2 properties so Spring Boot does not fail at context startup
# trying to resolve the issuer URI. TestSecurityConfig (a @TestConfiguration in test
# sources) overrides the security filter chain to permit all requests, so these
# values are never actually used in tests.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Disable real mail sending in tests
spring.mail.host=localhost
spring.mail.port=1025
