# Include the test-only probe migration
spring.flyway.locations=classpath:db/migration,classpath:db/testmigration

# JWT RSA-2048 key pair for tests (dev-only keys)
app.jwt.private-
app.jwt.public-
app.jwt.access-token-ttl=PT15M
app.jwt.refresh-token-ttl=P30D
app.jwt.email-verification-ttl=PT24H
app.jwt.password-reset-ttl=PT24H

app.superuser.email=owner@test.local
app.superuser.password=test-changeme

app.frontend-url=http://localhost:3000

# Google OAuth2 stubs so context starts without real credentials
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Disable real mail sending in tests
spring.mail.host=localhost
spring.mail.port=1025

# Dummy storage config
storage.endpoint=http://localhost:9000
storage.bucket=test
storage.private-bucket=test-private
storage.access-key=test
storage.secret-key=test
storage.base-url=http://localhost:9000/test

# Stub Stripe config
stripe.secret-key=sk_test_stub
stripe.webhook-secret=whsec_stub
